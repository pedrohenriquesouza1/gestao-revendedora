<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de pedidos</title>
    <link rel="stylesheet" href="styles/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="img/available.png" type="image/x-icon">
</head>
<body>

    <header>
        <h1>Gerenciador De Pedidos / Gerador de Recibo</h1>
    </header>

    <main class="container">

        <div class="tabs">
            <button class="tab-btn active" onclick="abrirAba('estoque', event)">📦 Estoque</button>
            <button class="tab-btn" onclick="abrirAba('vendas', event)">💰 Vendas/Clientes</button>
        </div>

        <div id="aba-estoque" class="conteudo-aba ativo">
            
            <section class="card">
                <h2>Novo Produto</h2>
                <div class="form-group">
                    <label>Nome do Produto</label>
                    <input type="text" id="input-nome" placeholder="Ex: Malbec">
                </div>
                <div class="row">
                    <div class="form-group half">
                        <label>Valor do Boleto</label>
                        <input type="number" id="input-compra" step="0.01">
                    </div>
                    <div class="form-group half">
                        <label>Valor da Revista</label>
                        <input type="number" id="input-venda" step="0.01">
                    </div>
                </div>
                <div class="form-group">
                    <label>Quantidade</label>
                    <input type="number" id="input-quant">
                </div>
                <button id="btn-adicionar" class="btn btn-primary">Adicionar</button>
            </section>

            <section class="card">
                <h2>Buscar no Estoque</h2>
                <div class="search-box">
                    <input type="text" id="search-nome" placeholder="Digite o nome...">
                    <button id="btn-buscar" class="btn btn-secondary">🔍</button>
                </div>
                <div id="resultado-busca" class="result-box"></div>
            </section>

            <section class="card">
                <h2>Remover Item</h2>
                <div class="search-box">
                    <input type="text" id="remove-nome" placeholder="Nome para excluir...">
                    <button id="btn-remover" class="btn btn-danger">🗑️</button>
                </div>
                <div id="msg-remocao" class="result-box"></div>
            </section>
        </div>

        <div id="aba-vendas" class="conteudo-aba">
            
            <section class="card destaque">
                <h2>Nova Venda</h2>
                <div class="form-group">
                    <label>Nome da Cliente</label>
                    <input type="text" id="venda-cliente-nome" placeholder="Quem comprou?">
                </div>
                <div class="form-group">
                    <label>Produto (Do Estoque)</label>
                    <input type="text" id="venda-produto-nome" placeholder="Nome do produto">
                </div>
                <div class="row">
                    <div class="form-group half">
                        <label>Qtd</label>
                        <input type="number" id="venda-qtd" value="1">
                    </div>
                    <div class="form-group half">
                        <label>Parcelas</label>
                        <input type="number" id="venda-parcelas" value="1" min="1" placeholder="Ex: 3">
                    </div>
                    <div class="form-group half">
                        <label>Data</label>
                        <input type="date" id="venda-data" required>
                    </div>
                </div>
                <button id="btn-adicionar-item-venda" class="btn btn-primary">Adicionar Produto</button>
                <button id="btn-confirmar-venda" class="btn btn-success" onclick="fazerVenda()">Confirmar Venda</button>
                <div id="msg-venda" class="result-box"></div>
                <button id="btn-gerar-pdf" class="btn btn-pdf"> Gerar Recibo em PDF</button>
            </section>

            <section class="card">
                <h2>Histórico da Cliente</h2>
                <div class="search-box">
                    <input type="text" id="historico-cliente-busca" placeholder="Nome da cliente...">
                    <button id="btn-buscar-historico" class="btn btn-secondary">Ver</button>
                </div>
                
                <div class="tabela-container">
                    <table id="tabela-historico">
                        <thead>
                            <tr>
                                <th>Produto</th>
                                <th>Qtd</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="corpo-tabela">
                            <tr><td colspan="3" style="text-align:center">Preencha campo acima...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div id="total-gasto-cliente" style="text-align: right; font-weight: bold; margin-top: 10px;"></div>
            </section>
        </div>
        
    </main>

    <footer>
        <p>&copy; Site feito por <a href="http://github.com/pedrohenriquesouza1" target="_blank" rel="noopener noreferrer">Pedro Henrique</a></p>
        <a href="https://www.flaticon.com/free-icons/inventory" title="inventory icons">Inventory icons created by Freepik - Flaticon</a>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/3.0.3/jspdf.umd.min.js" integrity="sha512-+EeCylkt9WHJk5tGJxYdecHOcXFRME7qnbsfeMsdQL6NUPYm2+uGFmyleEqsmVoap/f3dN/sc3BX9t9kHXkHHg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!--lib jspdf-->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/5.0.2/jspdf.plugin.autotable.min.js" integrity="sha512-JizZOUNesiGhMcp9fsA/9W31FOat6QysBM8hSj6ir8iIANIUJ2mhko7Lo1+j0ErftmJ8SebMZLm9iielKjeIEQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!--plugin de tabela do jspdf-->

    <script src="src/control.js"></script> <!-- ainda em desenvolvimento... -->

    <script>
        function abrirAba(nomeAba, evento) {
            var conteudos = document.getElementsByClassName("conteudo-aba");
            for (var i = 0; i < conteudos.length; i++) {
                conteudos[i].classList.remove("ativo");
            }

            var botoes = document.getElementsByClassName("tab-btn");
            for (var i = 0; i < botoes.length; i++) {
                botoes[i].classList.remove("active");
            }

            document.getElementById('aba-' + nomeAba).classList.add("ativo");

            if (evento) {
                evento.currentTarget.classList.add("active");
            }
        }

        document.getElementById('venda-data').valueAsDate = new Date();
    </script>
</body>
</html>
